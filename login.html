<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Gustavo Matos</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-primary: #ffb803;
            --color-bg-dark: #0d0d0d;
            --color-bg-light: #1a1a1a;
            --color-text: #e0e0e0;
            --color-text-muted: #999;
        }

        body {
            background: linear-gradient(135deg, var(--color-bg-dark) 0%, #1a0a00 100%);
            font-family: 'Montserrat', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: var(--color-text);
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
        }

        .login-card {
            background: var(--color-bg-light);
            border: 2px solid var(--color-primary);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 20px 60px rgba(255, 184, 3, 0.1);
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header h1 {
            font-size: 2rem;
            font-weight: 800;
            color: var(--color-primary);
            margin-bottom: 0.5rem;
        }

        .login-header p {
            color: var(--color-text-muted);
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--color-text);
        }

        input {
            width: 100%;
            padding: 0.8rem;
            background: var(--color-bg-dark);
            border: 1px solid #333;
            border-radius: 6px;
            color: var(--color-text);
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 10px rgba(255, 184, 3, 0.2);
        }

        .btn-login {
            width: 100%;
            padding: 0.8rem;
            background: var(--color-primary);
            border: none;
            border-radius: 6px;
            color: var(--color-bg-dark);
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }

        .btn-login:hover {
            background: #ffcc33;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 184, 3, 0.3);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login:disabled {
            background: #666;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            background: #8b0000;
            border: 1px solid #ff0000;
            color: #ffcccc;
            padding: 0.8rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            display: none;
            font-size: 0.9rem;
        }

        .success-message {
            background: #006400;
            border: 1px solid #00ff00;
            color: #ccffcc;
            padding: 0.8rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            display: none;
            font-size: 0.9rem;
        }

        .back-link {
            text-align: center;
            margin-top: 1.5rem;
        }

        .back-link a {
            color: var(--color-primary);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        .back-link a:hover {
            color: #ffcc33;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 3px solid rgba(255, 184, 3, 0.3);
            border-radius: 50%;
            border-top-color: var(--color-bg-dark);
            animation: spin 0.8s linear infinite;
            margin-right: 0.5rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .btn-loading {
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>GM Admin</h1>
                <p>Painel de Controle - Gustavo Matos</p>
            </div>

            <div id="error-message" class="error-message"></div>
            <div id="success-message" class="success-message"></div>

            <form id="login-form">
                <div class="form-group">
                    <label for="username">Usuário</label>
                    <input type="text" id="username" placeholder="Digite seu usuário" required>
                </div>

                <div class="form-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" placeholder="Digite sua senha" required>
                </div>

                <button type="submit" class="btn-login" id="login-btn">Entrar</button>
            </form>

            <div class="back-link">
                <a href="/">← Voltar para o site</a>
            </div>
        </div>
    </div>

    <!-- Configuração centralizada de URLs (DEVE VIR PRIMEIRO) -->
    <script src="config.js"></script>

    <script>
        const form = document.getElementById('login-form');
        const username = document.getElementById('username');
        const password = document.getElementById('password');
        const btn = document.getElementById('login-btn');
        const errorMsg = document.getElementById('error-message');
        const successMsg = document.getElementById('success-message');

        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            btn.disabled = true;
            btn.textContent = '⏳ Autenticando...';

            try {
                const response = await fetch(window.APP_CONFIG.API_LOGIN, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include',
                    body: JSON.stringify({
                        username: username.value,
                        password: password.value
                    })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    successMsg.textContent = '✓ Login realizado! Redirecionando...';
                    successMsg.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = window.APP_CONFIG.ADMIN_PANEL;
                    }, 1500);
                } else {
                    errorMsg.textContent = '✗ Usuário ou senha inválidos';
                    errorMsg.style.display = 'block';
                    password.value = '';
                    btn.disabled = false;
                    btn.textContent = 'Entrar';
                }
            } catch (err) {
                console.error('Error:', err);
                errorMsg.textContent = '✗ Erro ao conectar com o servidor';
                errorMsg.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Entrar';
            }
        });
    </script>
</body>
</html>
