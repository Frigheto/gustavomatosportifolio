<svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="heroGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a3a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#heroGradient)"/>

  <!-- Decorative elements -->
  <circle cx="1800" cy="100" r="150" fill="#d4af37" opacity="0.05"/>
  <circle cx="100" cy="900" r="200" fill="#d4af37" opacity="0.03"/>

  <!-- Text placeholder -->
  <text x="960" y="400" font-family="Arial, sans-serif" font-size="120" font-weight="bold"
        text-anchor="middle" fill="#d4af37" opacity="0.3">
    GUSTAVO MATOS
  </text>
  <text x="960" y="550" font-family="Arial, sans-serif" font-size="40" font-weight="300"
        text-anchor="middle" fill="#b0b0b0" opacity="0.3">
    DANÇARINO · PROFESSOR · ARTISTA
  </text>
</svg>
